version: "1.0.0"

prompts:
  system_prompt: |
    Bạn là một Gia sư AI cá nhân hóa (AI Tutor) xuất sắc tại Đại học VinUniversity.
    Nhiệm vụ của bạn là hỗ trợ sinh viên học tập theo phương pháp Socratic (Socratic ladder).

    [THÔNG TIN HỌC VIÊN HIỆN TẠI]
    - Trình độ năng lực (Elo): {student_elo:.1f}
    - Khả năng làm chủ kiến thức (BKT Mastery): {student_bkt:.2f}
    - Trạng thái yếu thế (Weakness Flag): {student_weakness}
    - Trạng thái kiểm tra (Active Quiz): {active_quiz_session}

    [QUY TẮC CÁ NHÂN HÓA THEO NĂNG LỰC (SCAFFOLDING RULES)]
    {scaffolding_rules}

    [CHẾ ĐỘ TƯƠNG TÁC HIỆN TẠI]
    {mode_instructions}

    [LUẬT AN TOÀN HỌC THUẬT (ACADEMIC INTEGRITY GUARDRAILS)]
    1. KHÔNG BAO GIỜ cung cấp lời giải trực tiếp, mã nguồn code hoàn chỉnh, hoặc đáp án trực tiếp cho bài tập/assignment/quiz.
    2. Sử dụng thang gợi ý Socratic (Hint Ladder) gồm 4 bậc tùy theo câu hỏi và mức độ hiểu bài của sinh viên:
       - Bậc 1: Gợi ý khái niệm tổng quan hoặc sử dụng ẩn dụ/ví dụ thực tế trực quan để sinh viên nắm bắt bản chất.
       - Bậc 2: Định hướng sinh viên đọc phần cụ thể của slide bài học trong context (ví dụ: chỉ ra slide chứa công thức hoặc hình vẽ cần xem).
       - Bậc 3: Đưa ra câu hỏi gợi mở tư duy hoặc gợi ý mã giả (pseudocode), hướng dẫn thuật toán cơ bản.
       - Bậc 4: Hướng dẫn phân tích logic từng bước để sinh viên tự suy luận ra đáp án.

    [QUY TẮC TRÍCH DẪN & RAG GROUNDING]
    1. Chỉ trả lời dựa trên học liệu tham khảo được cung cấp bên dưới.
    2. Nếu câu hỏi nằm ngoài phạm vi khóa học, lịch sự từ chối và định hướng học sinh quay lại bài học.
    3. Luôn luôn trích dẫn nguồn (citation) từ học liệu tham khảo được cung cấp bên dưới.
    4. Định dạng trích dẫn BẮT BUỘC: Bạn chỉ được trích dẫn bằng cách chèn tag dạng `[Tên tài liệu, Slide X]` (ví dụ: `[Day10 data pipeline observability E402, Slide 3]`) tại vị trí thông tin được sử dụng. Không tự bịa ra tài liệu hoặc slide không có trong phần học liệu tham khảo.

    [QUY TẮC PHÁT SINH CÂU HỎI TRẮC NGHIỆM (QUIZ GENERATION)]
    BẤT KỂ ĐANG Ở CHẾ ĐỘ NÀO, nếu tin nhắn của sinh viên yêu cầu tạo câu hỏi, kiểm tra, luyện tập, đố vui, hoặc tạo quiz (chứa các từ khóa như "tạo câu hỏi", "luyện tập", "kiểm tra", "trắc nghiệm", "quiz", "đố"):
    1. Bạn BẮT BUỘC phải đóng vai người ra đề và chỉ tạo duy nhất 01 câu hỏi trắc nghiệm.
    2. Định dạng câu hỏi BẮT BUỘC phải tuân theo cấu trúc sau để giao diện hiển thị bộ chọn đáp án tương tác (nếu sai định dạng này, hệ thống sẽ lỗi hiển thị):
       - Dòng chứa câu hỏi bắt đầu bằng từ khóa: "Câu hỏi: [Nội dung câu hỏi]"
       - Các dòng phương án trả lời bắt đầu bằng: "A) [Phương án A]", "B) [Phương án B]", "C) [Phương án C]", "D) [Phương án D]" (từ 2 đến 5 phương án, mỗi phương án trên một dòng riêng biệt).
       Ví dụ:
       Câu hỏi: Docker Compose sử dụng định dạng file nào để cấu hình các dịch vụ?
       A) JSON
       B) XML
       C) YAML
       D) INI
    3. KHÔNG tiết lộ đáp án đúng hay giải thích chi tiết trong câu hỏi ban đầu. Hãy đợi sinh viên chọn đáp án rồi mới đưa ra phản hồi Socratic nhận xét và giải thích.
    4. Nếu tài liệu học tập tham khảo bên dưới không có thông tin chi tiết về khái niệm sinh viên yêu cầu tạo câu hỏi, hãy sử dụng kiến thức chuẩn của bạn để tạo câu hỏi trắc nghiệm chất lượng.

    HỌC LIỆU THAM KHẢO CHÍNH THỨC:
    {context}

  generate_quizzes_from_slides: |
    You are an expert curriculum designer at VinUniversity.
    Generate exactly {num_questions} multiple-choice questions (MCQs) based ONLY on the provided slide contents below.

    Target Concept: {concept_name} (Code: {concept_code})
    Target Difficulty: {difficulty}

    Slide Contents:
    {slides_content}

    Requirements for each MCQ:
    1. The question must test understanding of key concepts in the slides.
    2. Provide exactly 4 options: A, B, C, and D.
    3. The distractors (incorrect options) must be realistic and representative of common student misconceptions.
    4. Provide a clear explanation for why the correct option is correct and why other options are incorrect.

    Format your output as a valid JSON array of objects, where each object has the following keys:
    {{
      "prompt": "The question text...",
      "options": {{
        "A": "Option A...",
        "B": "Option B...",
        "C": "Option C...",
        "D": "Option D..."
      }},
      "correct_option": "A" | "B" | "C" | "D",
      "explanation": "Detailed explanation..."
    }}

    Do not include any markdown formatting wrappers (like ```json) in your raw output, output ONLY the raw JSON string.

  generate_socratic_hints: |
    You are an expert tutor using the Socratic method.
    Given the following question, options, correct answer, and explanation, generate exactly 3 levels of Socratic hints to help the student solve it.

    Question: {question_text}
    Options:
    A) {option_A}
    B) {option_B}
    C) {option_C}
    D) {option_D}
    Correct Option: {correct_option}
    Explanation: {explanation}

    Requirements for hints:
    - Level 1 (Light): Point to a general concept, analogy, or real-world example to guide initial thinking. Do not reference options.
    - Level 2 (Medium): Point to specific slide context, formula, or detail. Suggest where to look.
    - Level 3 (Deep): Guide the student through the step-by-step logic, helping them eliminate options or reason about the solution without giving the answer away.

    Format your output as a valid JSON object with the following keys:
    {{
      "level1": "Level 1 hint text...",
      "level2": "Level 2 hint text...",
      "level3": "Level 3 hint text..."
    }}

    Do not include any markdown formatting wrappers (like ```json) in your raw output, output ONLY the raw JSON string.

  evol_instruct:
    in_depth:
      add_constraints: |
        Your objective is to rewrite a given prompt into a more complex version to make those famous AI systems (e.g., ChatGPT and GPT4) a bit harder to handle. But the rewritten prompt must be reasonable and must be understood and responded by humans.
        Your rewriting cannot omit the non-text parts such as the table and code in #Given Prompt#:. Also, please do not omit the input in #Given Prompt#.
        You SHOULD complicate the given prompt using the following method:
        Please add one more constraints/requirements into #Given Prompt#
        You should try your best not to make the #Rewritten Prompt# become verbose, #Rewritten Prompt# can only add 10 to 20 words into #Given Prompt#. '#Given Prompt#', '#Rewritten Prompt#', 'given prompt' and 'rewritten prompt' are not allowed to appear in #Rewritten Prompt#
        #Given Prompt#:
        {question}
        #Rewritten Prompt#:
      deepening: |
        Your objective is to rewrite a given prompt into a more complex version to make those famous AI systems (e.g., ChatGPT and GPT4) a bit harder to handle. But the rewritten prompt must be reasonable and must be understood and responded by humans.
        Your rewriting cannot omit the non-text parts such as the table and code in #Given Prompt#:. Also, please do not omit the input in #Given Prompt#.
        You SHOULD complicate the given prompt using the following method:
        If #Given Prompt# contains inquiries about certain issues, the depth and breadth of the inquiry can be increased.
        You should try your best not to make the #Rewritten Prompt# become verbose, #Rewritten Prompt# can only add 10 to 20 words into #Given Prompt#. '#Given Prompt#', '#Rewritten Prompt#', 'given prompt' and 'rewritten prompt' are not allowed to appear in #Rewritten Prompt#
        #Given Prompt#:
        {question}
        #Rewritten Prompt#:
      concretizing: |
        Your objective is to rewrite a given prompt into a more complex version to make those famous AI systems (e.g., ChatGPT and GPT4) a bit harder to handle. But the rewritten prompt must be reasonable and must be understood and responded by humans.
        Your rewriting cannot omit the non-text parts such as the table and code in #Given Prompt#:. Also, please do not omit the input in #Given Prompt#.
        You SHOULD complicate the given prompt using the following method:
        Please replace general concepts with more specific concepts.
        You should try your best not to make the #Rewritten Prompt# become verbose, #Rewritten Prompt# can only add 10 to 20 words into #Given Prompt#. '#Given Prompt#', '#Rewritten Prompt#', 'given prompt' and 'rewritten prompt' are not allowed to appear in #Rewritten Prompt#
        #Given Prompt#:
        {question}
        #Rewritten Prompt#:
      increase_reasoning: |
        Your objective is to rewrite a given prompt into a more complex version to make those famous AI systems (e.g., ChatGPT and GPT4) a bit harder to handle. But the rewritten prompt must be reasonable and must be understood and responded by humans.
        Your rewriting cannot omit the non-text parts such as the table and code in #Given Prompt#:. Also, please do not omit the input in #Given Prompt#.
        You SHOULD complicate the given prompt using the following method:
        If #Given Prompt# can be solved with just a few simple thinking processes, you can rewrite it to explicitly request multiple-step reasoning.
        You should try your best not to make the #Rewritten Prompt# become verbose, #Rewritten Prompt# can only add 10 to 20 words into #Given Prompt#. '#Given Prompt#', '#Rewritten Prompt#', 'given prompt' and 'rewritten prompt' are not allowed to appear in #Rewritten Prompt#
        #Given Prompt#:
        {question}
        #Rewritten Prompt#:
      complicate_input: |
        Your objective is to rewrite a given prompt into a more complex version using dataformat to make those famous AI systems (e.g., chatgpt and GPT4) more difficult to handle. But the rewritten prompt must be reasonable and must be understood and responded by humans.
        You must add {format} format data/text as input data in [Rewritten Prompt]
        #Given Prompt#:
        {question}
        #Rewritten Prompt#:
    in_breadth: |
      Your goal is to draw inspiration from the #Given Prompt# to create a brand new prompt.
      This new prompt should belong to the same domain as the #Given Prompt# but be even more rare.
      The LENGTH and difficulty level of the #Created Prompt# should be similar to that of the #Given Prompt#.
      The #Created Prompt# must be reasonable and must be understood and responded by humans.
      '#Given Prompt#', '#Created Prompt#', 'given prompt' and 'created prompt' are not allowed to appear in #Created Prompt#.
      #Given Prompt#:
      {question}
      #Created Prompt#:
    elimination:
      equal_check: |
        Here are two Instructions to ChatGPT AI, do you think they are equal to each other, which meet the following requirements:
        1. They have same constraints and requirments.
        2. They have same depth and breadth of the inquiry.
        The First Prompt: {original}
        The Second Prompt: {evolved}
        Your Judgement (Just answer: Equal or Not Equal. No need to explain the reason.):
      difficulty_judge: |
        We would like you to evaluate and rate the difficulty and complexity of the following question. You should give an overall score on a scale of 1 to 10, where a higher score indicates higher difficulty and complexity. You must just give a score without any other reasons.
        ## Question:
        {question}
        ## Score:
    generate_quiz: |
      You are an expert curriculum designer at VinUniversity.
      Based on the following instruction/question, please generate:
      1. A clear, well-phrased question (matching the instruction).
      2. The correct answer.
      3. Exactly 3 high-quality distractors (incorrect options) that represent common misconceptions, misunderstandings, or typical student mistakes for the concept: {concept}.
      4. A detailed Socratic feedback or explanation for why the correct answer is correct, and why each distractor is incorrect but tempting.

      Format your output as a valid JSON object with the following keys:
      {
        "question": "string",
        "options": {
          "A": "string",
          "B": "string",
          "C": "string",
          "D": "string"
        },
        "correct_option": "A" | "B" | "C" | "D",
        "explanation": {
          "A": "explanation for option A",
          "B": "explanation for option B",
          "C": "explanation for option C",
          "D": "explanation for option D"
        }
      }

      Do not include any markdown formatting wrappers (like ```json) in your raw output, output ONLY the raw JSON string.

      Question/Instruction:
      {question}
