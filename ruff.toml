target-version = "py311"
line-length = 120
exclude = [
    ".git",
    ".venv",
    ".agent",
    ".agents",
    ".claude",
    "frontend/.agent",
    "plans"
]

[lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501", "N806"]

[lint.isort]
known-first-party = ["src"]
known-third-party = ["supabase"]

[format]
quote-style = "double"
indent-style = "space"
