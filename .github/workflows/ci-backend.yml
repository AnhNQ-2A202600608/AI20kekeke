name: Backend CI
# Deploy Trigger: 2026-07-19 10:55

on:
  push:
    branches: [main, dev, trong/test-deploy-and-connect-db]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/manual-backend-verification.yml'
  pull_request:
    branches: [main, dev, trong/test-deploy-and-connect-db]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/manual-backend-verification.yml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4 # nosemgrep
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2 # nosemgrep
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Generate Mock Graphs for Tests
        run: uv run python scripts/generate_mock_graphs.py

      - name: Run tests with coverage
        run: |
          uv pip install coverage
          uv run coverage run -m pytest tests/ -v --tb=short
          uv run coverage report --include="src/*" --fail-under=65
          uv run coverage report --include="src/services/adaptive/*" --fail-under=42
          uv run coverage report --include="src/services/auth/*" --fail-under=48
        env:
          APP_ENV: test
          OPENAI_API_KEY: test-key
          RATE_LIMIT_ENABLED: false

      - name: Run Production Readiness Checker
        run: uv run python scripts/check_production_ready.py

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2 # nosemgrep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          uv pip install semgrep
          uv run semgrep --config=auto --error

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0 # nosemgrep
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Trigger Render Production CD
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Render Staging CD
        if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'trong/test-deploy-and-connect-db')
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}"