name: Backend CI

on:
  push:
    branches: [main, master, universal-starter, dev]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, master, universal-starter, dev]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: uv pip install -e ".[dev,rag-ocr]"

      - name: Lint with ruff
        working-directory: ./backend
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Run tests
        working-directory: ./backend
        run: uv run pytest tests/ -v --tb=short
        env:
          APP_ENV: test

      - name: Validate Module Manifests
        run: uv run python scripts/validate_modules.py

      - name: Production Readiness Check
        run: uv run python scripts/check_production_ready.py

  deploy:
    name: Deploy Backend
    needs: backend-checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy → Render Production
        if: github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'universal-starter'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Warning: RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deployment."
            exit 0
          fi
          echo "Triggering Render Production deployment..."
          curl -f -X POST "$RENDER_DEPLOY_HOOK"

      - name: Deploy → Render Staging
        if: github.ref_name == 'dev'
        env:
          RENDER_DEPLOY_HOOK_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_STAGING" ]; then
            echo "Warning: RENDER_DEPLOY_HOOK_URL_STAGING secret is not set. Skipping deployment."
            exit 0
          fi
          echo "Triggering Render Staging deployment..."
          curl -f -X POST "$RENDER_DEPLOY_HOOK_STAGING"
