name: Backend CI

on:
  push:
    branches: [ main, master, universal-starter ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main, master, universal-starter ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./backend[dev]"

      - name: Backend Lint & Type Check
        run: |
          python -m ruff check --config backend/pyproject.toml backend/ scripts/
          python -m ruff format --check --config backend/pyproject.toml backend/ scripts/

      - name: Run Backend Tests
        run: |
          python -m pytest backend/tests/ -v

      - name: Validate Module Manifests
        run: |
          python scripts/validate_modules.py

  deploy-backend:
    needs: backend-checks
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/universal-starter')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Warning: RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deployment."
            exit 0
          fi
          echo "Triggering Render deployment..."
          curl -f -X POST "$RENDER_DEPLOY_HOOK"

