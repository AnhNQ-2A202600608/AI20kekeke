name: Backend CI

on:
  push:
    branches: [main, dev, trong/test-deploy-and-connect-db]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/manual-backend-verification.yml'
  pull_request:
    branches: [main, dev, trong/test-deploy-and-connect-db]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/manual-backend-verification.yml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@f59384f111b22d257e29ca319986bbac93ccf472 # v5.3.0
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Generate Mock Graphs for Tests
        run: uv run python scripts/generate_mock_graphs.py

      - name: Run tests with coverage
        run: |
          uv pip install coverage
          uv run coverage run -m pytest tests/ -v --tb=short
          uv run coverage report --include="src/*" --fail-under=65
          uv run coverage report --include="src/services/adaptive/*" --fail-under=42
          uv run coverage report --include="src/services/auth/*" --fail-under=48
        env:
          APP_ENV: test
          OPENAI_API_KEY: test-key
          RATE_LIMIT_ENABLED: false

      - name: Run Production Readiness Checker
        run: uv run python scripts/check_production_ready.py

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@30b4f84c47b5fc75cb39fa6a9c1e7932ee5d9472 # v2.3.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          uv pip install semgrep
          uv run semgrep --config=auto --error

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f259c5309573be0a1e948f224084ae34d3d758 # v0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Trigger Render Production CD
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Render Staging CD
        if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'trong/test-deploy-and-connect-db')
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}"