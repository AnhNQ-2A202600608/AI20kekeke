name: Backend CI

on:
  push:
    branches: [ main, master, universal-starter ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main, master, universal-starter ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./backend[dev]"

      - name: Backend Lint & Type Check
        run: |
          python -m ruff check --config backend/pyproject.toml backend/ scripts/
          python -m ruff format --check --config backend/pyproject.toml backend/ scripts/

      - name: Run Backend Tests
        run: |
          python -m pytest backend/tests/ -v

      - name: Validate Module Manifests
        run: |
          python scripts/validate_modules.py
