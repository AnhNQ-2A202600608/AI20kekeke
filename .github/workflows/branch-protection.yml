name: Validate PR Source Branch

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-source-branch:
    name: Validate Source Branch
    runs-on: self-hosted

    steps:
      - name: Check source branch
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          echo "Source branch: $SOURCE_BRANCH"
          echo "Target branch: $TARGET_BRANCH"

          if [[ "$TARGET_BRANCH" == "main" && "$SOURCE_BRANCH" != "dev" && ! "$SOURCE_BRANCH" =~ ^hotfix/ ]]; then
            echo "::error::PRs to 'main' are only allowed from 'dev' or 'hotfix/*' branches."
            echo "::error::Current source branch: $SOURCE_BRANCH"
            echo ""
            echo "Workflow:"
            echo "  1. feature/* -> dev"
            echo "  2. dev -> main"
            echo "  3. hotfix/* -> main for urgent fixes"
            exit 1
          fi

          echo "Branch validation passed: $SOURCE_BRANCH -> $TARGET_BRANCH"
