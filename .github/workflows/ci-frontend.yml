name: Frontend CI

on:
  push:
    branches: [main, master, universal-starter, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main, master, universal-starter, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    name: Frontend Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install Dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend Lint & Compile
        working-directory: ./frontend
        run: |
          pnpm run lint
          pnpm run typecheck

  deploy-frontend:
    name: Deploy to Vercel
    needs: frontend-checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Set Deployment Environment
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "master" || "${{ github.ref_name }}" == "universal-starter" ]]; then
            echo "VERCEL_ARGS=--prod" >> $GITHUB_ENV
          else
            echo "VERCEL_ARGS=" >> $GITHUB_ENV
          fi

      - name: Deploy to Vercel (Remote Cloud Build)
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Warning: VERCEL_TOKEN secret is not set. Skipping deployment."
            exit 0
          fi
          pnpm dlx vercel deploy ${{ env.VERCEL_ARGS }} --yes --token=$VERCEL_TOKEN
