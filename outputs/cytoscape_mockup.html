            // Interactive Tooltip on hover
            const tooltip = document.getElementById('tooltip');
            
            cy.on('mouseover', 'node', function(evt) {
                const node = evt.target;
                const data = node.data();
                
                tooltip.innerHTML = `
                    <div style="font-weight: bold; color: #38bdf8; margin-bottom: 4px;">${data.label.split('\n')[0]}</div>
                    <div style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px;">Day ${data.day} &bull; ${data.track}</div>
                    <div style="line-height: 1.3;">${data.desc}</div>
                `;
                tooltip.style.display = 'block';
            });

            cy.on('mousemove', 'node', function(evt) {
                const renderedPosition = evt.renderedPosition;
                tooltip.style.left = (renderedPosition.x + 15) + 'px';
                tooltip.style.top = (renderedPosition.y + 15) + 'px';
            });

            cy.on('mouseout', 'node', function() {
                tooltip.style.display = 'none';
