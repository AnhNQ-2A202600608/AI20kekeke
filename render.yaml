services:
  - type: web
    name: vaic-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/v1/health   # ← Cấu hình đúng path thực tế của FastAPI
    autoDeploy: false                  # ← Để CI/CD điều khiển quá trình deploy qua webhook
    envVars:
      - key: APP_NAME
        value: vaic-universal-starter
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: STORAGE_PATH
        value: /app/data
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_ORIGIN
        sync: false  # ← Được cấu hình động từ Render dashboard (Domain của Vercel)
